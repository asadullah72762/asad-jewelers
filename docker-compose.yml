services:

  # Backend - Node.js API
  backend:
    build: ./backend
    container_name: jewelers-backend
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - jewelers-network

  # Frontend - React App
  frontend:
    build: ./frontend
    container_name: jewelers-frontend
    restart: unless-stopped
    networks:
      - jewelers-network

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: jewelers-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - jewelers-network

networks:
  jewelers-network:
    driver: bridge
